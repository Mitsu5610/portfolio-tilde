<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Lawrence Olivier N. Tilde — 4th Year BSIT, Western Mindanao State University. OJT at Vintazk Outsourcing. Full Stack Developer & AI/CV Engineer." />
  <meta name="author" content="Lawrence Olivier N. Tilde" />
  <title>Lawrence Olivier N. Tilde | Full Stack Developer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Prevent flash of wrong theme before CSS loads -->
  <script>
    (function() {
      var t = localStorage.getItem('portfolio-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/buttons.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/hero.css" />
  <link rel="stylesheet" href="css/sections.css" />
  <link rel="stylesheet" href="css/others.css" />
  <link rel="stylesheet" href="css/theme.css" />

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init('YOUR_PUBLIC_KEY');</script>
</head>

<body>

  <div class="cursor"          id="cursor"></div>
  <div class="cursor-follower" id="cursor-follower"></div>

  <div id="app"></div>

  <script>
    'use strict';

    document.body.style.overflow = 'hidden';

    const components = [
      'components/loader.html',
      'components/navbar.html',
      'components/hero.html',
      'components/about.html',
      'components/education.html',
      'components/skills.html',
      'components/projects.html',
      'components/contact.html',
      'components/footer.html',
    ];

    async function loadComponents() {
      const app = document.getElementById('app');
      for (const path of components) {
        const res  = await fetch(path);
        const html = await res.text();
        const wrap = document.createElement('div');
        wrap.innerHTML = html;
        app.appendChild(wrap);
      }
      bootApp();
    }

    function bootApp() {

      // 0. Draw social icons via JS (script tags in fetched HTML don't execute)
      const socialIcons = {
        github:    'M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z',
        linkedin:  'M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z',
        facebook:  'M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z',
        instagram: 'M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z'
      };
      const svgNS = 'http://www.w3.org/2000/svg';
      document.querySelectorAll('.contact-social-icon[data-icon]').forEach(el => {
        const key = el.getAttribute('data-icon');
        if (!socialIcons[key]) return;
        const svg = document.createElementNS(svgNS, 'svg');
        svg.setAttribute('width', '22'); svg.setAttribute('height', '22');
        svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'currentColor');
        const path = document.createElementNS(svgNS, 'path');
        path.setAttribute('d', socialIcons[key]);
        svg.appendChild(path);
        el.appendChild(svg);
      });

      // 0.5 Theme Toggle
      (function() {
        const toggle    = document.getElementById('theme-toggle');
        const iconEl    = document.getElementById('theme-icon');
        let   theme     = localStorage.getItem('portfolio-theme') || 'dark';

        function applyTheme(t) {
          theme = t;
          document.documentElement.setAttribute('data-theme', t);
          iconEl.textContent   = t === 'dark' ? '☀' : '☾';
          localStorage.setItem('portfolio-theme', t);
          // expose to matrix canvas
          window._portfolioTheme = t;
        }

        // Sync icon with initial theme (HTML attr already set via head script)
        applyTheme(theme);

        toggle && toggle.addEventListener('click', () => {
          applyTheme(theme === 'dark' ? 'light' : 'dark');
        });
      })();

      // 1. Loader
      const loader = document.getElementById('page-loader');
      setTimeout(() => {
        if (loader) loader.classList.add('hidden');
        document.body.style.overflow = '';
        initReveal();
      }, 1400);

      // 2. Scroll Reveal
      function initReveal() {
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.12, rootMargin: '0px 0px -50px 0px' });
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
      }

      // 3. Custom Cursor
      const cursor   = document.querySelector('.cursor');
      const follower = document.querySelector('.cursor-follower');
      let mouseX = 0, mouseY = 0, followerX = 0, followerY = 0;

      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX; mouseY = e.clientY;
        cursor.style.left = mouseX + 'px';
        cursor.style.top  = mouseY + 'px';
      });

      (function animateFollower() {
        followerX += (mouseX - followerX) * 0.12;
        followerY += (mouseY - followerY) * 0.12;
        follower.style.left = followerX + 'px';
        follower.style.top  = followerY + 'px';
        requestAnimationFrame(animateFollower);
      })();

      document.querySelectorAll('a, button, .project-card, .skill-category, .contact-item').forEach(el => {
        el.addEventListener('mouseenter', () => {
          cursor.style.width = '20px';   cursor.style.height = '20px';
          follower.style.width = '54px'; follower.style.height = '54px';
          follower.style.opacity = '0.3';
        });
        el.addEventListener('mouseleave', () => {
          cursor.style.width = '12px';   cursor.style.height = '12px';
          follower.style.width = '36px'; follower.style.height = '36px';
          follower.style.opacity = '0.5';
        });
      });

      // 4. Navbar
      const navbar      = document.getElementById('navbar');
      const navLinks    = document.querySelectorAll('.nav-link');
      const mobileMenu  = document.getElementById('nav-links');
      const mobileFab   = document.getElementById('mobile-fab');
      let   menuScrollY = 0;

      window.addEventListener('scroll', () => {
        navbar.classList.toggle('scrolled', window.scrollY > 50);
        let current = '';
        document.querySelectorAll('section[id]').forEach(s => {
          if (window.scrollY >= s.offsetTop - 120) current = s.id;
        });
        navLinks.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + current));
      });

      function openMenu() {
        menuScrollY = window.scrollY;
        document.body.style.top = `-${menuScrollY}px`;
        document.body.classList.add('menu-open');
        mobileMenu  && mobileMenu.classList.add('open');
        mobileFab   && mobileFab.classList.add('open');
      }

      function closeMenu() {
        mobileMenu  && mobileMenu.classList.remove('open');
        mobileFab   && mobileFab.classList.remove('open');
        document.body.classList.remove('menu-open');
        document.body.style.top = '';
        // Restore scroll position — compatible with iOS Safari + older Android
        window.scrollTo(0, menuScrollY);
      }

      function toggleMenu() {
        mobileMenu && mobileMenu.classList.contains('open') ? closeMenu() : openMenu();
      }

      mobileFab && mobileFab.addEventListener('click', toggleMenu);

      // Close menu when a nav link is tapped
      navLinks.forEach(l => l.addEventListener('click', closeMenu));

      // Close menu when clicking the dim backdrop (outside the panel)
      mobileMenu && mobileMenu.addEventListener('click', (e) => {
        if (e.target === mobileMenu) closeMenu();
      });

      // Mobile touch feedback — add .tapped on touchstart, remove after 300ms
      navLinks.forEach(link => {
        link.addEventListener('touchstart', () => {
          link.classList.add('tapped');
        }, { passive: true });
        link.addEventListener('touchend', () => {
          setTimeout(() => link.classList.remove('tapped'), 300);
        }, { passive: true });
        link.addEventListener('touchcancel', () => {
          link.classList.remove('tapped');
        }, { passive: true });
      });

      // 5. Matrix Canvas
      const canvas = document.getElementById('matrix-canvas');
      if (canvas) {
        const ctx = canvas.getContext('2d');
        const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノ';
        const fontSize = 12;
        function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        const drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
        setInterval(() => {
          const isLight = window._portfolioTheme === 'light';
          ctx.fillStyle = isLight ? 'rgba(242,242,244,0.08)' : 'rgba(8,8,8,0.05)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = isLight ? 'rgba(232,0,13,0.5)' : '#E8000D';
          ctx.font = fontSize + 'px Space Mono, monospace';
          drops.forEach((y, i) => {
            const char = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(char, i * fontSize, y * fontSize);
            if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
          });
        }, 50);
      }

      // 6. Skill Bars
      const barObs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('animated'); });
      }, { threshold: 0.5 });
      document.querySelectorAll('.skill-bar-fill').forEach(b => barObs.observe(b));

      // 7. Count Up
      function countUp(el) {
        const target = parseInt(el.getAttribute('data-target'));
        const suffix = el.getAttribute('data-suffix') || '';
        const step   = target / (1500 / 16);
        let current  = 0;
        const timer  = setInterval(() => {
          current += step;
          if (current >= target) { current = target; clearInterval(timer); }
          el.textContent = Math.floor(current) + suffix;
        }, 16);
      }
      const counterObs = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting && !e.target.classList.contains('counted')) {
            e.target.classList.add('counted');
            countUp(e.target);
          }
        });
      }, { threshold: 0.5 });
      document.querySelectorAll('.count-up').forEach(el => counterObs.observe(el));

      // 8. Glitch
      setInterval(() => {
        const el = document.querySelector('.hero-name .highlight');
        if (!el) return;
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = '';
      }, 6000);

      // 9. Click Particles
      document.addEventListener('click', (e) => {
        for (let i = 0; i < 6; i++) {
          const p = document.createElement('div');
          p.style.cssText = 'position:fixed;width:4px;height:4px;background:#E8000D;border-radius:50%;left:' + e.clientX + 'px;top:' + e.clientY + 'px;pointer-events:none;z-index:9997;';
          document.body.appendChild(p);
          const angle = (i / 6) * Math.PI * 2;
          const dist  = 30 + Math.random() * 40;
          requestAnimationFrame(() => {
            p.style.transition = 'all ' + (0.4 + Math.random() * 0.3) + 's ease-out';
            p.style.transform  = 'translate(' + Math.cos(angle) * dist + 'px,' + Math.sin(angle) * dist + 'px)';
            p.style.opacity    = '0';
          });
          setTimeout(() => p.remove(), 800);
        }
      });

      // 10. Smooth Scroll
      document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', (e) => {
          e.preventDefault();
          const target = document.querySelector(anchor.getAttribute('href'));
          if (target) window.scrollTo({ top: target.offsetTop - 70, behavior: 'smooth' });
        });
      });

      // 11. Contact Form
      const contactForm = document.getElementById('contact-form');
      contactForm && contactForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = this.querySelector('[type="submit"]');
        const origTxt = btn.innerHTML;
        btn.innerHTML = '<span style="opacity:0.7">Sending...</span>';
        btn.disabled = true;
        emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', {
          from_name:  document.getElementById('name').value,
          from_email: document.getElementById('email').value,
          subject:    document.getElementById('subject').value,
          message:    document.getElementById('message').value,
        })
        .then(() => {
          btn.innerHTML = '✓ Message Sent!';
          btn.style.background = btn.style.borderColor = '#166534';
          this.reset();
          setTimeout(() => { btn.innerHTML = origTxt; btn.style.background = btn.style.borderColor = ''; btn.disabled = false; }, 3500);
        })
        .catch(err => {
          console.error(err);
          btn.innerHTML = '✗ Failed — Try Again';
          btn.style.background = btn.style.borderColor = '#7f1d1d';
          setTimeout(() => { btn.innerHTML = origTxt; btn.style.background = btn.style.borderColor = ''; btn.disabled = false; }, 3500);
        });
      });

      // 11. Gmail CTA button — pulse animation to invite click
      const gmailBtn = document.getElementById('gmail-cta');
      if (gmailBtn) {
        // Typing animation on the button text
        const messages = [
          'Send me a message ↗',
          'Open Gmail now ↗',
          'Let\'s talk ↗',
          'Hire me ↗',
        ];
        let msgIndex = 0;
        setInterval(() => {
          msgIndex = (msgIndex + 1) % messages.length;
          gmailBtn.querySelector('.gmail-cta-text').textContent = messages[msgIndex];
        }, 3000);
      }

      console.log('%c LAWRENCE OLIVIER N. TILDE ', 'background:#E8000D;color:white;font-size:14px;font-weight:bold;padding:8px 16px;');
      console.log('%c Full Stack Developer @ MITSU BYTES ', 'color:#E8000D;font-size:12px;');
    }

    loadComponents();
  </script>

</body>
</html>
