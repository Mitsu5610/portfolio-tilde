<!--
  CONTACT.HTML — Contact Section Component
  Lawrence Olivier N. Tilde Portfolio
-->

<section id="contact" class="section-padding">
  <div class="container">

    <div class="section-header reveal">
      <div class="section-tag">Get In Touch</div>
      <h2 class="section-title">Let's <span class="text-red">Connect</span></h2>
      <p class="section-subtitle">
        Have a project in mind, want to collaborate, or just want to say hi?
        My inbox is always open.
      </p>
    </div>

    <div class="contact-grid">

      <!-- Left: Info -->
      <div>
        <div class="contact-info-list">

          <div class="contact-item reveal">
            <div class="contact-item-icon">✉</div>
            <div class="contact-item-content">
              <div class="contact-item-label">Email</div>
              <div class="contact-item-value">
                <a href="mailto:lawrencetilde@gmail.com">lawrencetilde@gmail.com</a>
              </div>
            </div>
          </div>

          <div class="contact-item reveal reveal-delay-1">
            <div class="contact-item-icon">📍</div>
            <div class="contact-item-content">
              <div class="contact-item-label">Location</div>
              <div class="contact-item-value">Zamboanga City, Philippines</div>
            </div>
          </div>

          <div class="contact-item reveal reveal-delay-2">
            <div class="contact-item-icon">🏢</div>
            <div class="contact-item-content">
              <div class="contact-item-label">Company</div>
              <div class="contact-item-value">MITSU BYTES</div>
            </div>
          </div>

          <div class="contact-item reveal reveal-delay-3">
            <div class="contact-item-icon">💼</div>
            <div class="contact-item-content">
              <div class="contact-item-label">Availability</div>
              <div class="contact-item-value" style="color:var(--red-primary);">
                ● Open to Opportunities
              </div>
            </div>
          </div>

        </div>

        <!-- Social -->
        <div class="contact-social reveal">
          <a href="https://github.com/" target="_blank" class="btn btn-icon" title="GitHub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
            </svg>
          </a>
          <a href="https://linkedin.com/" target="_blank" class="btn btn-icon" title="LinkedIn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </a>
          <a href="mailto:lawrencetilde@gmail.com" class="btn btn-icon" title="Email">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M2 7l10 7 10-7"/>
            </svg>
          </a>
        </div>
      </div>

      <!-- Right: Form -->
      <div class="reveal reveal-delay-2">
        <form class="contact-form" id="contact-form" novalidate>

          <div class="form-group">
            <label class="form-label" for="name">Your Name</label>
            <input
              class="form-input"
              type="text"
              id="name"
              name="name"
              placeholder="John Doe"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input
              class="form-input"
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="subject">Subject</label>
            <input
              class="form-input"
              type="text"
              id="subject"
              name="subject"
              placeholder="Project Inquiry"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="message">Message</label>
            <textarea
              class="form-textarea"
              id="message"
              name="message"
              placeholder="Tell me about your project or idea..."
              required
            ></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-lg form-submit">
            Send Message
            <span class="btn-arrow"></span>
          </button>

        </form>
      </div>

    </div>
  </div>
</section>
